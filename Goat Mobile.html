<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Goat — Premium Mobile UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
  body {
    font-family: "Inter", -apple-system, "SF Pro Text", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    background: #06040A;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }

  /* No native focus rings inside the prototype */
  button:focus, input:focus { outline: none; }

  /* Animations */
  @keyframes goatBob {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }
  @keyframes goatSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes goatPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217,168,71,0.35); }
    50% { box-shadow: 0 0 0 6px rgba(217,168,71,0); }
  }
  @keyframes goatRays { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes goatPlay {
    from { transform: translate(-50%, -50%) translate(0, -120px) scale(0.7); opacity: 0; }
    to   { transform: translate(-50%, -50%) translate(var(--tx, 0), var(--ty, 0)) rotate(var(--r, 0)); opacity: 1; }
  }
  @keyframes goatFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Floating controls scrollbar */
  div::-webkit-scrollbar { height: 0; width: 0; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Design tokens (plain JS) -->
<script src="tokens.js"></script>

<!-- Tweaks panel starter (JSX) -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Project files (JSX) -->
<script type="text/babel" src="system.jsx"></script>
<script type="text/babel" src="cards.jsx"></script>
<script type="text/babel" src="screens-menu.jsx"></script>
<script type="text/babel" src="screens-game.jsx"></script>
<script type="text/babel" src="screens-account.jsx"></script>
<script type="text/babel" src="screens-desktop.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
